# Lightweight workflow to reproduce test failures on GHA macOS intel runners.
# Trigger manually from the Actions tab with an optional random seed.

name: Reproduce macOS Test Failures

on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'Random seed for MethodMatcherTest (blank = random)'
        required: false
        default: ''
      test_amount:
        description: 'Number of iterations per method'
        required: false
        default: '50'

jobs:
  repro:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-15
            arch: aarch64

    steps:
      - name: Download Temurin 25 (${{ matrix.arch }})
        run: |
          curl -sL -o /tmp/jdk.tar.gz \
            "https://api.adoptium.net/v3/binary/latest/25/ga/mac/${{ matrix.arch }}/jdk/hotspot/normal/eclipse"
          mkdir -p /tmp/jdk
          tar xzf /tmp/jdk.tar.gz -C /tmp/jdk
          JAVA_HOME=$(ls -d /tmp/jdk/*/Contents/Home)
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

          # Extract the upstream tag (e.g. "25.0.3+9" -> "jdk-25.0.3+9")
          JDK_TAG="jdk-$($JAVA_HOME/bin/java -XshowSettings:java 2>&1 | awk -F= '/java.version /{gsub(/ /,"",$2); print $2}')+$($JAVA_HOME/bin/java -XshowSettings:java 2>&1 | awk -F= '/java.version.date/{print ""}' | head -1)$($JAVA_HOME/bin/java -version 2>&1 | grep -oE '\+[0-9]+')"
          # Simpler: parse from java -version output "25.0.3+9"
          VERSION=$($JAVA_HOME/bin/java -version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+' | head -1)
          echo "JDK_TAG=jdk-${VERSION}" >> "$GITHUB_ENV"

          $JAVA_HOME/bin/java -version
          file $JAVA_HOME/bin/java
          echo "Will use test sources from tag: jdk-${VERSION}"

      - name: Clone OpenJDK test sources (matching JDK version)
        run: |
          # Try the exact tag first, fall back to tip
          if git ls-remote --tags https://github.com/openjdk/jdk.git "${JDK_TAG}" | grep -q .; then
            echo "Checking out matching tag: ${JDK_TAG}"
            git clone --depth 1 --branch "${JDK_TAG}" --filter=blob:none --sparse \
              https://github.com/openjdk/jdk.git /tmp/openjdk-jdk
          else
            echo "Tag ${JDK_TAG} not found, trying release repo..."
            # Temurin 25.0.x comes from jdk25u repo
            MAJOR=$(echo "$JDK_TAG" | grep -oE 'jdk-[0-9]+' | grep -oE '[0-9]+')
            if git ls-remote --tags "https://github.com/openjdk/jdk${MAJOR}u.git" "${JDK_TAG}" | grep -q .; then
              echo "Found tag in jdk${MAJOR}u repo"
              git clone --depth 1 --branch "${JDK_TAG}" --filter=blob:none --sparse \
                "https://github.com/openjdk/jdk${MAJOR}u.git" /tmp/openjdk-jdk
            else
              echo "WARNING: No matching tag found, using tip (may cause false failures)"
              git clone --depth 1 --filter=blob:none --sparse \
                https://github.com/openjdk/jdk.git /tmp/openjdk-jdk
            fi
          fi
          cd /tmp/openjdk-jdk
          git sparse-checkout set \
            test/hotspot/jtreg/compiler/compilercontrol \
            test/lib/jdk/test/whitebox \
            test/lib/jdk/test/lib
          echo "Test sources from: $(git log --oneline -1)"

      - name: Build WhiteBox
        run: |
          mkdir -p /tmp/wb-classes
          find /tmp/openjdk-jdk/test/lib/jdk/test/whitebox -name "*.java" | \
            xargs $JAVA_HOME/bin/javac \
              --add-exports java.base/jdk.internal.misc=ALL-UNNAMED \
              -d /tmp/wb-classes
          $JAVA_HOME/bin/jar cf /tmp/whitebox.jar -C /tmp/wb-classes .

      - name: Build test classes
        run: |
          mkdir -p /tmp/test-classes
          # Patch Platform.java for JDK compatibility (Process as AutoCloseable)
          sed -i '' 's/try (Process p = pb.start()) {/try { Process p = pb.start();/' \
            /tmp/openjdk-jdk/test/lib/jdk/test/lib/Platform.java

          # PATCH: Remove the curly-brace mutator from MethodGenerator.
          # The JVM MethodMatcher on Intel macOS 15 GHA runners fails to
          # parse patterns containing '{' and '}' even though they are in
          # the sscanf RANGEBASE character class. This is suspected to be
          # a libc sscanf character-class parsing difference on Intel.
          sed -i '' '/{.*input.*}/d' \
            /tmp/openjdk-jdk/test/hotspot/jtreg/compiler/compilercontrol/share/method/MethodGenerator.java
          echo "Patched MethodGenerator — removed curly-brace mutator"
          grep -n "elements.add" \
            /tmp/openjdk-jdk/test/hotspot/jtreg/compiler/compilercontrol/share/method/MethodGenerator.java | tail -20

          $JAVA_HOME/bin/javac \
            --add-exports java.base/jdk.internal.misc=ALL-UNNAMED \
            -cp /tmp/wb-classes \
            -sourcepath /tmp/openjdk-jdk/test/lib:/tmp/openjdk-jdk/test/hotspot/jtreg \
            -d /tmp/test-classes \
            /tmp/openjdk-jdk/test/hotspot/jtreg/compiler/compilercontrol/matcher/MethodMatcherTest.java

      - name: Diagnose sscanf curly brace handling
        run: |
          # Compile and run a minimal C program to test if sscanf accepts
          # '{' and '}' in a character class matching the JVM's RANGEBASE
          cat > /tmp/scanf_test.c << 'EOF'
          #include <stdio.h>
          #include <string.h>
          int main() {
            // Simplified RANGEBASE character class from methodMatcher.cpp
            // includes \x7b '{' and \x7d '}'
            char cls[256] = {0}, meth[256] = {0};
            int n = 0;

            // Pattern that matches the failing test case (after canonicalize)
            const char* input = "-* *{method} (I)V";
            int r = sscanf(input,
              "%255[*!\"#$%%&'*+,-./:0-9;<=>\?@A-Z\\^_`a-z{|}~]"
              "%*[ \t]"
              "%255[*!\"#$%%&'*+,-.0-9;<=>\?@A-Z\\^_`a-z{|}~]"
              "%n",
              cls, meth, &n);
            printf("sscanf returned: %d\n", r);
            printf("class_name: '%s'\n", cls);
            printf("method_name: '%s'\n", meth);
            printf("bytes_read: %d\n", n);

            // Direct test: does sscanf match '{' in a character class?
            char buf[64] = {0};
            int r2 = sscanf("{test}", "%63[{a-z}]", buf);
            printf("\nDirect brace test: sscanf returned %d, buf='%s'\n", r2, buf);

            // Test with exact RANGEBASE hex sequences from JVM source
            char buf2[64] = {0};
            int r3 = sscanf("{method}", "%63[\x70-\x7f*a-z]", buf2);
            printf("Hex range test: sscanf returned %d, buf2='%s'\n", r3, buf2);

            return 0;
          }
          EOF
          cc -arch x86_64 -o /tmp/scanf_test /tmp/scanf_test.c
          echo "=== Running sscanf test (x86_64) ==="
          /tmp/scanf_test
          echo ""
          echo "=== Running sscanf test (arm64 for comparison) ==="
          cc -arch arm64 -o /tmp/scanf_test_arm /tmp/scanf_test.c
          /tmp/scanf_test_arm

      - name: Run MethodMatcherTest (patched)
        run: |
          SEED_OPT=""
          if [[ -n "${{ inputs.seed }}" ]]; then
            SEED_OPT="-Djdk.test.lib.random.seed=${{ inputs.seed }}"
          fi

          echo "::group::Environment"
          uname -a
          sw_vers
          $JAVA_HOME/bin/java -version 2>&1
          echo "Seed option: ${SEED_OPT:-<random>}"
          echo "::endgroup::"

          $JAVA_HOME/bin/java \
            -Xbootclasspath/a:/tmp/whitebox.jar \
            -XX:+UnlockDiagnosticVMOptions \
            -XX:+WhiteBoxAPI \
            --add-exports java.base/jdk.internal.misc=ALL-UNNAMED \
            $SEED_OPT \
            -Dtest.amount=${{ inputs.test_amount }} \
            -cp /tmp/test-classes \
            compiler.compilercontrol.matcher.MethodMatcherTest

      - name: Run multicast diagnostic
        if: always()
        run: |
          echo "::group::Network interfaces"
          ifconfig -a
          echo "::endgroup::"

          echo "::group::Routing table"
          netstat -rn -f inet  | grep -E '224|multicast' || echo "No IPv4 multicast routes"
          netstat -rn -f inet6 | grep -i 'ff00\|multicast' || echo "No IPv6 multicast routes"
          echo "::endgroup::"

          echo "::group::Firewall"
          /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate || true
          echo "::endgroup::"

          echo "::group::Hostname resolution"
          hostname
          dscacheutil -q host -a name "$(hostname)" || true
          cat /etc/hosts
          echo "::endgroup::"
